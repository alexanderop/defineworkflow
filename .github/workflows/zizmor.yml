# Static security analysis of the GitHub Actions workflows themselves.
# https://docs.zizmor.sh/
name: zizmor

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  zizmor:
    name: GitHub Actions security analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          persona: pedantic
          # Scan only our own workflows. `repos/` holds read-only reference
          # subtrees (ink, etc.) whose workflows are upstream's, not ours to
          # harden — mirrors `.github/codeql/codeql-config.yml`'s `paths-ignore`.
          inputs: ./.github/workflows/
          # Annotations need no special permissions (unlike SARIF upload).
          annotations: true
          advanced-security: false
