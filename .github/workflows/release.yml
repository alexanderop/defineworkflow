name: release

# Automated versioning. On every push to main, release-please reads the
# conventional commits since the last release and maintains an open
# "chore: release vX.Y.Z" PR containing the computed version bump + changelog.
#
# Merging that PR:
#   1. bumps packages/workflow/package.json + .release-please-manifest.json,
#   2. writes packages/workflow/CHANGELOG.md,
#   3. creates the git tag (vX.Y.Z) and the GitHub Release,
#   4. triggers the `publish` job below, which calls publish.yml to publish
#      to npm with provenance.
#
# It can also be run manually via workflow_dispatch as a break-glass publish for
# an existing tag.
#
# Note: releases created via GITHUB_TOKEN do NOT trigger other workflows, so we
# call publish.yml directly (workflow_call) instead of relying on a
# `release: published` event.
#
# For the same reason, the *release PR* release-please opens must NOT be created
# with the default GITHUB_TOKEN — PRs opened by it never fire `pull_request`
# events, so required checks (test, CodeQL) would never run and the PR stays
# BLOCKED forever. We mint a short-lived GitHub App installation token instead,
# so the PR is opened as the app and its checks run normally.
#
# Requires repo/org secrets RELEASE_PLEASE_APP_ID and RELEASE_PLEASE_APP_KEY
# from a GitHub App (installed on this repo) granted Contents: read/write and
# Pull requests: read/write. If those secrets are absent the token step is
# skipped and release-please falls back to GITHUB_TOKEN (PR opens but its
# checks must be re-triggered manually by close/reopen).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish (e.g. v0.1.0)"
        required: true
        type: string

# Serialize release-PR maintenance; never cancel an in-flight run mid-release.
concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    if: github.repository == 'alexanderop/defineworkflow' && github.event_name == 'push'
    permissions:
      contents: write # create release commits, tags, and GitHub Releases
      pull-requests: write # create/update the release PR
    outputs:
      # The single released package (`defineworkflow`) is rooted at the repo root
      # (".") so that commits to ANY package count toward its version — it bundles
      # all `@workflow/*` packages into its dist, so a change in packages/cli or
      # packages/core does change the published artifact. A root-path (".")
      # component emits the BARE `release_created`/`tag_name` outputs (path-scoped
      # components emit PATH-PREFIXED ones); read the bare outputs here.
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # Mint a GitHub App installation token so the release PR is opened as the
      # app, not GITHUB_TOKEN — otherwise its required checks never trigger.
      # Skipped (and we fall back to GITHUB_TOKEN) when the app secrets aren't set.
      - id: app-token
        if: vars.RELEASE_PLEASE_APP_ID != ''
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_KEY }}
          # Scope the token to exactly what release-please needs (mirrors the
          # job's GITHUB_TOKEN permissions); avoids blanket installation scopes.
          permission-contents: write # release commits, tags, GitHub Releases
          permission-pull-requests: write # create/update the release PR
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # Falls back to the default GITHUB_TOKEN when the app token is unset.
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish release
    needs: release-please
    if: always() && github.repository == 'alexanderop/defineworkflow' && ((github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      id-token: write # forwarded to publish.yml for OIDC trusted publishing
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}
    # No `secrets: inherit` — publish.yml publishes via OIDC trusted publishing
    # and declares no `workflow_call` secrets, so it needs none forwarded.
