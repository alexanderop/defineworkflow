name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only needs to read the repo. Jobs that need
# more must opt in explicitly.
permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so --changed can diff against the base
          persist-credentials: false # don't leave the git token on disk

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      # `pnpm-workspace.yaml` `allowBuilds` allowlists which dependencies may run
      # build/postinstall scripts (only esbuild + lefthook) — pnpm 11's built-in
      # supply-chain guard, so a frozen install can't execute arbitrary scripts.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint + typecheck run across the whole repo: oxlint is fast, and typecheck
      # builds every package's dist (which dependents and the e2e project need).
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Find unused files, dependencies, and exports. Runs after typecheck so
      # every package's dist/ exists (knip resolves sibling packages the same way
      # the runtime does — via their published `exports`).
      - name: Knip
        run: pnpm knip

      # Run ONLY the unit tests affected by this change.
      #
      # `vitest --changed <ref>` selects test files via the module import graph,
      # so editing one package runs that package's tests plus any dependents that
      # import it. forceRerunTriggers (package.json, vitest.config.*) fall back to
      # the full suite when a shared config/manifest changes.
      #
      # On a PR we diff against the merge-base with the target branch; on a push
      # to main we diff against the previous commit.
      # GitHub context values are passed via `env:` (never interpolated directly
      # into the script) to avoid template-injection — see zizmor's template-injection rule.
      - name: Run affected unit tests
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # Fetch the base ref with FULL history (no --depth): a shallow fetch
            # grafts origin/$BASE_REF as a single parentless commit, so when the
            # branch base lies behind the current base tip (e.g. main was updated
            # since this PR branched) `git merge-base` finds no common ancestor and
            # exits 1, failing the step. The checkout already uses fetch-depth: 0,
            # so a full fetch here is cheap and keeps merge-base correct.
            git fetch --no-tags origin "$BASE_REF"
            CHANGED_SINCE="$(git merge-base "origin/$BASE_REF" HEAD)"
          else
            CHANGED_SINCE="$BEFORE_SHA"
          fi
          echo "Running unit tests changed since: $CHANGED_SINCE"
          pnpm vitest run --project unit --changed "$CHANGED_SINCE" --passWithNoTests

  # Block PRs that introduce a dependency with a known high+ severity advisory
  # or a disallowed license. Scoped to pull_request (the action diffs the PR's
  # dependency changes against the base via GitHub's dependency graph).
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  # Continuously audit the dependencies we actually ship (`--prod`) for known
  # advisories — catches vulnerabilities already in the tree, which the PR-scoped
  # dependency-review above does not. High+ only, to avoid blocking on
  # unfixable low-severity transitive noise.
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
