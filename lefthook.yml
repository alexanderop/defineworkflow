# https://lefthook.dev/configuration/
pre-commit:
  parallel: true
  commands:
    # Auto-format staged files with oxfmt and re-stage the results, so every
    # commit lands already formatted. Scoped to the file types oxfmt handles and
    # excludes the vendored `repos/`, the VitePress `apps/` site (Vue SFCs trip
    # oxfmt's parser), and release-please-owned CHANGELOGs. `stage_fixed: true`
    # adds oxfmt's edits back to the index. Config lives in `.oxfmtrc.json`.
    format:
      priority: 1
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,mts,cts,json,jsonc,md}"
      exclude:
        - "repos/**"
        - "apps/**"
        - "**/CHANGELOG.md"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck
    # React-doctor health check for the Ink UI package. Scoped to staged ui
    # source so it only runs when those files change, gated at `--fail-on
    # warning` so a regression blocks the commit. The staged scan drops
    # dead-code/dependency analysis (it would false-flag unused deps when only a
    # subset of files is staged); CI runs the full scan. Config lives in
    # packages/ui/react-doctor.config.json.
    react-doctor:
      glob: "packages/ui/src/*.{ts,tsx}"
      run: pnpm --filter @workflow/ui run react-doctor:staged

pre-push:
  commands:
    test:
      run: pnpm test
